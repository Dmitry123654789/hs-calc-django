{% load static %}
<!DOCTYPE html>
<html lang="ru" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="{% static 'img/fav/favicon.ico' %}" >
    <link rel="apple-touch-icon"
          sizes="180x180"
          href="{% static 'img/fav/apple-touch-icon.png' %}">
    <link rel="icon"
          type="image/png"
          sizes="96x96"
          href="{% static 'img/fav/favicon-96x96.png' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>
      {% block title %}{% endblock %}
    </title>
  </head>
  <body class="d-flex flex-column h-100">
    {% include "includes/header.html" %}
    <main class="pt-5 my-5 flex-grow-1">
      <div class="container">
        {% block content %}
          <h1 class="display-1 top-0 start-50">Контент не подвезли</h1>
          <img class="img-fluid" src="{% static "img/pretty_cat.jpg" %}">
        {% endblock %}
      </div>
    </main>
    {% include "includes/footer.html" %}
  </body>
  <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  {% block scripts %}{% endblock %}
</html>
